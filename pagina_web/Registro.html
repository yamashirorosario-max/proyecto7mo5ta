<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - EEST N9</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css"> </head>
<body>

    <div class="form-card">
        <div class="school-logo-container">
            <img src="Logo Escuela.jpg" alt="Logo Escuela" class="school-logo">
        </div>

        <form id="registro-form" action="#">
            <div class="input-group">
                <i class="fa-regular fa-user"></i>
                <input type="text" id="registro-nombre" placeholder="Nombre" required>
            </div>

            <div class="input-group">
                <i class="fa-regular fa-user"></i>
                <input type="text" id="registro-apellido" placeholder="Apellido" required>
            </div>

            <div class="input-group">
                <i class="fa-regular fa-id-card"></i>
                <input type="number" id="registro-dni" placeholder="DNI" required>
            </div>

            <div class="input-group">
                <i class="fa-solid fa-door-open"></i>
                <input type="text" id="registro-curso" placeholder="Curso" required>
            </div>

            <div class="input-group">
                <i class="fa-solid fa-book-open"></i>
                <input type="text" id="registro-turno" placeholder="Turno" required>
            </div>

            <button type="submit" class="main-button">Registrarse</button>
        </form>
    </div>

    <script src="login.js" defer></script>
</body>
</html>
