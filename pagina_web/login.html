<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - EEST N9</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css"> </head>
<body>

    <div class="form-card">
        <div class="school-logo-container">
            <img src="Logo Escuela.jpg" alt="Logo Institucional" class="school-logo">
        </div>

        <form id="login-form">
            <div class="input-group">
                <i class="fa-solid fa-at"></i>
                <input type="text" id="login-usuario" placeholder="Usuario">
            </div>

            <div class="input-group">
                <i class="fa-regular fa-envelope"></i>
                <input type="email" id="login-email" placeholder="Email ID">
            </div>

            <div class="input-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="login-password" placeholder="Password">
            </div>

            <div class="remember-me">
                <input type="checkbox" id="rem">
                <label for="rem">Remember me</label>
            </div>

            <button type="submit" class="main-button" id="login-button">LOGIN</button>
        </form>
    </div>

    <script src="login.js" defer></script>
</body>
</html>
